<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Portfolio...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: 'Space Grotesk', sans-serif;
            color: white;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #ff3366, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 51, 102, 0.3);
            border-radius: 50%;
            border-top-color: #ff3366;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        .message {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        .redirect-link {
            display: inline-block;
            padding: 1rem 2rem;
            background: rgba(255, 51, 102, 0.1);
            border: 1px solid #ff3366;
            color: #ff3366;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .redirect-link:hover {
            background: #ff3366;
            color: white;
            transform: translateY(-2px);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">KRITHIK R</div>
        <div class="loader"></div>
        <div class="message">Redirecting to portfolio...</div>
        <a href="https://KRITHIKR007.github.io/portfolio/" class="redirect-link">Click here if not redirected</a>
    </div>

    <script>
        // Redirect to GitHub Pages after a short delay
        setTimeout(() => {
            window.location.href = 'https://KRITHIKR007.github.io/portfolio/';
        }, 2000);
    </script>
</body>
</html>
